<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Juego 1 - Crucigrama Matemático</title>

    <!-- AQUÍ PONDRÁS TU ÍCONO -->
    <link rel="icon" href="img//imagenpestaña.jpg">

    <link rel="stylesheet" href="css/juego1.css">

    <!-- LIBRERÍA CONFETI -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</head>
<body>

    <div class="contenedor">

    <h1>🧮 Crucigrama de Sumas 🧮</h1>

    <p class="subtitulo">
        Arrastra los números correctos y completa las operaciones
    </p>

    <!-- IMÁGENES -->
    <div class="imagenes">

        <img src="https://cdn-icons-png.flaticon.com/512/2784/2784469.png">

        <img src="https://cdn-icons-png.flaticon.com/512/3405/3405807.png">

        <img src="https://cdn-icons-png.flaticon.com/512/3132/3132693.png">

    </div>

    <!-- PUNTAJE -->
    <div class="puntaje">
        ⭐ Puntaje: <span id="score">0</span>
    </div>

    <!-- CRUCIGRAMA -->
    <div class="grid">

        <!-- FILA 1 -->
        <div class="celda">4</div>
        <div class="celda">+</div>
        <div class="celda">5</div>
        <div class="celda">=</div>
        <div class="dropzone" data-answer="9"></div>

        <!-- FILA 2 -->
        <div class="celda">2</div>
        <div class="celda">+</div>
        <div class="celda">6</div>
        <div class="celda">=</div>
        <div class="dropzone" data-answer="8"></div>

        <!-- FILA 3 -->
        <div class="celda">1</div>
        <div class="celda">+</div>
        <div class="celda">1</div>
        <div class="celda">=</div>
        <div class="dropzone" data-answer="2"></div>

        <!-- FILA 4 -->
        <div class="celda">3</div>
        <div class="celda">+</div>
        <div class="celda">4</div>
        <div class="celda">=</div>
        <div class="dropzone" data-answer="7"></div>

        <!-- FILA 5 -->
        <div class="celda">5</div>
        <div class="celda">+</div>
        <div class="celda">3</div>
        <div class="celda">=</div>
        <div class="dropzone" data-answer="8"></div>

    </div>

    <!-- NÚMEROS -->
    <div class="numeros-container">

        <div class="numero" draggable="true">9</div>

        <div class="numero" draggable="true">7</div>

        <div class="numero" draggable="true">2</div>

        <div class="numero" draggable="true">8</div>

        <div class="numero" draggable="true">8</div>

    </div>

    <!-- BOTONES -->
    <div class="botones">

        <button id="verificar">
        Verificar
        </button>

        <button id="reiniciar">
        Intentar Nuevamente
        </button>

        <button id="siguiente" disabled>
        Siguiente Actividad
        </button>

    </div>

    </div>

    <!-- AUDIOS -->
    <audio id="audioCorrecto">
    <source src="sonidos/correcto.mp3" type="audio/mpeg">
    </audio>

    <audio id="audioIncorrecto">
    <source src="sonidos/incorrecto.mp3" type="audio/mpeg">
    </audio>

    <audio id="audioClick">
    <source src="sonidos/audioingreso.mp3" type="audio/mpeg">
    </audio>

    <script src="js/juego1.js"></script>

</body>
</html>
