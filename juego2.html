<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Juego 2 - Crucigrama de Restas</title>

    <!-- ÍCONO -->
    <link rel="icon" href="img/imagenpestaña.jpg">

    <link rel="stylesheet" href="css/juego2.css">

    <!-- CONFETI -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</head>
<body>

    <div class="contenedor">

    <h1>➖ Crucigrama de Restas ➖</h1>

    <p class="subtitulo">
        Arrastra los números correctos y completa las operaciones
    </p>

    <!-- IMÁGENES -->
    <div class="imagenes">

        <img src="https://cdn-icons-png.flaticon.com/512/2784/2784469.png">

        <img src="https://cdn-icons-png.flaticon.com/512/3405/3405807.png">

        <img src="https://cdn-icons-png.flaticon.com/512/3132/3132693.png">

    </div>

    <!-- PUNTAJE -->
    <div class="puntaje">
        ⭐ Puntaje: <span id="score">0</span>
    </div>

    <!-- CRUCIGRAMA -->
    <div class="grid">

        <!-- FILA 1 -->
        <div class="celda">15</div>
        <div class="celda">-</div>
        <div class="celda">7</div>
        <div class="celda">=</div>
        <div class="dropzone" data-answer="8"></div>

        <!-- FILA 2 -->
        <div class="celda">20</div>
        <div class="celda">-</div>
        <div class="celda">9</div>
        <div class="celda">=</div>
        <div class="dropzone" data-answer="11"></div>

        <!-- FILA 3 -->
        <div class="celda">18</div>
        <div class="celda">-</div>
        <div class="celda">6</div>
        <div class="celda">=</div>
        <div class="dropzone" data-answer="12"></div>

        <!-- FILA 4 -->
        <div class="celda">14</div>
        <div class="celda">-</div>
        <div class="celda">5</div>
        <div class="celda">=</div>
        <div class="dropzone" data-answer="9"></div>

        <!-- FILA 5 -->
        <div class="celda">13</div>
        <div class="celda">-</div>
        <div class="celda">4</div>
        <div class="celda">=</div>
        <div class="dropzone" data-answer="9"></div>

    </div>

    <!-- NÚMEROS -->
    <div class="numeros-container">

        <div class="numero" draggable="true">12</div>

        <div class="numero" draggable="true">8</div>

        <div class="numero" draggable="true">11</div>

        <div class="numero" draggable="true">9</div>

        <div class="numero" draggable="true">9</div>

    </div>

    <!-- BOTONES -->
    <div class="botones">

        <button id="verificar">
        Verificar
        </button>

        <button id="reiniciar">
        Intentar Nuevamente
        </button>

        <button id="siguiente" disabled>
        Siguiente Actividad
        </button>

    </div>

    </div>

    <!-- AUDIOS -->
    <audio id="audioCorrecto">
    <source src="audio/correcto.mp3" type="audio/mpeg">
    </audio>

    <audio id="audioIncorrecto">
    <source src="audio/incorrecto.mp3" type="audio/mpeg">
    </audio>

    <audio id="audioClick">
    <source src="audio/logrado.mp3" type="audio/mpeg">
    </audio>

    <script src="js/juego2.js"></script>

</body>
</html>
